<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prasthi-AI - Health Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --header-bg: #128c7e;
    --chat-bg: #efeae2;
    --incoming-msg: #ffffff;
    --outgoing-msg: #d9fdd3;
    --send-btn: #25d366;
    --primary-text: #111b21;
    --secondary-text: #667781;
    --input-bg: #f0f0f0;
    --border-color: #e5ddd5;
  }

  html, body { height: 100%; }

  body {
    background: var(--chat-bg);
    color: var(--primary-text);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* WhatsApp Cross-hatch background pattern */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px),
      repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
    pointer-events: none;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--header-bg);
    flex-shrink: 0;
    position: relative;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .logo-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .logo-text {
    font-size: 15px;
    color: white;
    font-weight: 500;
  }

  .logo-subtitle {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.8);
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.8);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #31a24c;
    box-shadow: 0 0 4px #31a24c;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .header-menu {
    color: white;
    font-size: 24px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
  }

  /* Chat area */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
    position: relative;
    z-index: 2;
  }

  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: rgba(0,0,0,.2); border-radius: 3px; }
  #chat::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.3); }

  /* Date separator */
  .date-separator {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 16px 0 12px 0;
    color: var(--secondary-text);
    font-size: 13px;
    text-align: center;
  }

  .date-separator::before,
  .date-separator::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-color);
  }

  .message {
    display: flex;
    gap: 8px;
    padding: 2px 0;
    animation: fadeSlide 0.3s ease;
  }

  .message.user {
    flex-direction: row-reverse;
    justify-content: flex-end;
  }

  .message.ai {
    justify-content: flex-start;
  }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-content {
    max-width: 60%;
    padding: 8px 12px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.4;
    word-wrap: break-word;
    position: relative;
  }

  .message.user .msg-content {
    background: var(--outgoing-msg);
    color: var(--primary-text);
    border-bottom-right-radius: 4px;
  }

  .message.ai .msg-content {
    background: var(--incoming-msg);
    color: var(--primary-text);
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 1px rgba(0,0,0,.1);
  }

  .msg-text {
    margin: 0;
    word-break: break-word;
  }

  .msg-text p {
    margin: 4px 0;
  }

  .msg-text p:first-child { margin-top: 0; }
  .msg-text p:last-child { margin-bottom: 0; }

  .msg-text pre {
    background: #f5f5f5;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 8px 10px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.4;
  }

  .msg-text code {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    background: #f5f5f5;
    padding: 2px 4px;
    border-radius: 3px;
  }

  .msg-text pre code {
    background: none;
    padding: 0;
  }

  .msg-text ul, .msg-text ol {
    padding-left: 18px;
    margin: 6px 0;
  }

  .msg-text li { margin: 3px 0; }
  .msg-text strong { font-weight: 600; }
  .msg-text h1, .msg-text h2, .msg-text h3 { margin: 10px 0 6px; }

  .msg-timestamp {
    font-size: 12px;
    color: var(--secondary-text);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .message.user .msg-timestamp {
    text-align: right;
  }

  .message.ai .msg-timestamp {
    text-align: left;
  }

  .double-tick {
    color: #31a24c;
    font-size: 11px;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--secondary-text);
    text-align: center;
    padding: 40px 20px;
  }

  .empty-icon {
    font-size: 60px;
    margin-bottom: 8px;
  }

  .empty-title {
    font-size: 20px;
    color: var(--primary-text);
    font-weight: 500;
  }

  .empty-subtitle {
    font-size: 14px;
    max-width: 300px;
    line-height: 1.5;
  }

  /* Suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
  }

  .suggestion {
    font-size: 13px;
    padding: 8px 16px;
    border: 1px solid var(--border-color);
    border-radius: 20px;
    cursor: pointer;
    color: var(--secondary-text);
    background: white;
    transition: all 0.2s;
  }

  .suggestion:hover {
    background: var(--header-bg);
    color: white;
    border-color: var(--header-bg);
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
    background: var(--incoming-msg);
    border-radius: 18px;
    box-shadow: 0 1px 1px rgba(0,0,0,.1);
    width: fit-content;
  }

  .typing span {
    width: 8px;
    height: 8px;
    background: var(--secondary-text);
    border-radius: 50%;
    opacity: 0.6;
    animation: blink 1.4s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 60%, 100% { opacity: 0.6; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  /* Input area */
  .input-area {
    background: var(--chat-bg);
    padding: 8px 12px 12px 12px;
    flex-shrink: 0;
    position: relative;
    z-index: 50;
  }

  .suggestions-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 8px 0 8px 0;
    margin-bottom: 4px;
  }

  .suggestions-row::-webkit-scrollbar { height: 4px; }
  .suggestions-row::-webkit-scrollbar-track { background: transparent; }
  .suggestions-row::-webkit-scrollbar-thumb { background: rgba(0,0,0,.2); border-radius: 2px; }

  .suggestion-chip {
    padding: 6px 12px;
    background: white;
    border: 1px solid var(--border-color);
    border-radius: 16px;
    cursor: pointer;
    font-size: 12px;
    color: var(--secondary-text);
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .suggestion-chip:hover {
    background: var(--send-btn);
    color: white;
    border-color: var(--send-btn);
  }

  .suggestion-chip.active {
    display: none;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-icon {
    width: 36px;
    height: 36px;
    background: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--header-bg);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .input-icon:hover {
    background: var(--send-btn);
    color: white;
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  textarea {
    width: 100%;
    background: white;
    border: none;
    border-radius: 20px;
    padding: 10px 14px;
    color: var(--primary-text);
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    line-height: 1.4;
    min-height: 36px;
    max-height: 100px;
    box-shadow: 0 1px 1px rgba(0,0,0,.1);
  }

  textarea:focus {
    box-shadow: 0 2px 4px rgba(0,0,0,.15);
  }

  textarea::placeholder { color: var(--secondary-text); }

  .send-btn {
    width: 36px;
    height: 36px;
    background: var(--send-btn);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    color: white;
    font-size: 18px;
  }

  .send-btn:hover {
    transform: scale(1.1);
  }

  .send-btn:active {
    transform: scale(0.95);
  }

  .send-btn:disabled {
    background: var(--input-bg);
    color: var(--secondary-text);
    cursor: not-allowed;
    transform: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">P</div>
    <div class="logo-info">
      <div class="logo-text">Prasthi-AI</div>
      <div class="logo-subtitle">Your AI Health Assistant</div>
    </div>
  </div>
  <div class="header-status">
    <div class="status-dot"></div>
    <span>Online</span>
  </div>
  <button class="header-menu">⋮</button>
</header>

<div id="chat"></div>

<div class="input-area">
  <div class="suggestions-row" id="suggestionsRow">
    <div class="suggestion-chip" onclick="suggestChip(this)">💊 Cold remedies</div>
    <div class="suggestion-chip" onclick="suggestChip(this)">😴 Sleep tips</div>
    <div class="suggestion-chip" onclick="suggestChip(this)">🍎 Diet plan</div>
    <div class="suggestion-chip" onclick="suggestChip(this)">🧘 Stress relief</div>
  </div>

  <div class="input-row">
    <button class="input-icon" title="Emoji" onclick="alert('Emoji feature coming soon')">😊</button>
    <div class="input-wrap">
      <textarea id="input" placeholder="Message" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="input-icon" title="Voice message" onclick="alert('Voice feature coming soon')">🎤</button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">✓</button>
  </div>
</div>

<script>
  console.log('[ChatUI] Initializing WhatsApp-style chatbot...');
  const chatEl = document.getElementById("chat");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const suggestionsRow = document.getElementById("suggestionsRow");
  let isLoading = false;
  let hasSentMessage = false;

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 100) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function suggestChip(el) {
    console.log('[ChatUI] Suggestion chip clicked:', el.textContent);
    const text = el.textContent.replace(/^[^\s]+\s/, '');
    inputEl.value = text;
    autoResize(inputEl);
    sendMessage();
  }

  function getTimeString() {
    const now = new Date();
    return now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
  }

  function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function showEmptyState() {
    console.log('[ChatUI] Showing empty state');
    chatEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">P</div>
        <div class="empty-title">Prasthi-AI</div>
        <div class="empty-subtitle">Your AI Health Assistant<br/>Ask me about your health</div>
        <div class="suggestions">
          <div class="suggestion" onclick="suggestStart(this)">💊 Cold remedies</div>
          <div class="suggestion" onclick="suggestStart(this)">😴 Sleep tips</div>
          <div class="suggestion" onclick="suggestStart(this)">🍎 Diet advice</div>
          <div class="suggestion" onclick="suggestStart(this)">🧘 Stress relief</div>
        </div>
      </div>
    `;
  }

  function suggestStart(el) {
    console.log('[ChatUI] Initial suggestion clicked:', el.textContent);
    const text = el.textContent.replace(/^[^\s]+\s/, '');
    inputEl.value = text;
    autoResize(inputEl);
    sendMessage();
  }

  function appendMessage(role, content) {
    console.log('[ChatUI] Appending message from', role, 'length:', content.length);
    
    // Show date separator on first message
    if (!hasSentMessage && role === "user") {
      const now = new Date();
      const today = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      const separator = document.createElement("div");
      separator.className = "date-separator";
      separator.textContent = "Today";
      chatEl.appendChild(separator);
      hasSentMessage = true;
    }

    const msg = document.createElement("div");
    msg.className = `message ${role === "user" ? "user" : "ai"}`;

    const isUser = role === "user";
    const isMarkdown = !isUser;
    
    const bodyContent = isMarkdown
      ? marked.parse(content).replace(/<p>/g, '<div class="msg-text"><p>').replace(/<\/p>/g, '</p></div>')
      : `<div class="msg-text"><p>${escapeHtml(content)}</p></div>`;

    const timeStr = getTimeString();
    const tickMark = isUser ? '<span class="double-tick">✓✓</span>' : '';

    msg.innerHTML = `
      <div class="msg-content">
        ${bodyContent}
        <div class="msg-timestamp">${timeStr} ${tickMark}</div>
      </div>
    `;

    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;
    
    // Hide suggestions after first message
    if (hasSentMessage && suggestionsRow) {
      suggestionsRow.style.display = 'none';
    }
  }

  function showTyping() {
    console.log('[ChatUI] Showing typing indicator...');
    const msg = document.createElement("div");
    msg.className = "message ai";
    msg.id = "typingMsg";
    msg.innerHTML = `
      <div class="typing">
        <span></span><span></span><span></span>
      </div>
    `;
    chatEl.appendChild(msg);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const typingMsg = document.getElementById("typingMsg");
    if (typingMsg) {
      typingMsg.remove();
      console.log('[ChatUI] Typing indicator removed');
    }
  }

  async function sendMessage() {
    const msg = inputEl.value.trim();
    if (!msg || isLoading) {
      console.warn('[ChatUI] Message empty or already loading');
      return;
    }

    console.log('[ChatUI] Sending message, length:', msg.length);
    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    autoResize(inputEl);

    appendMessage("user", msg);
    showTyping();

    try {
      console.log('[ChatUI] Calling /api/chat endpoint...');
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg }),
      });

      console.log('[ChatUI] Response status:', res.status);
      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        console.error('[ChatUI] API Error:', data.error);
        throw new Error(data.error || "Request failed");
      }
      
      console.log('[ChatUI] Response data received, reply length:', data.reply.length);
      appendMessage("assistant", data.reply);
    } catch (err) {
      console.error('[ChatUI] Error:', err.message);
      removeTyping();
      appendMessage("assistant", `⚠️ Error: ${err.message}`);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
      console.log('[ChatUI] Message processing complete');
    }
  }

  console.log('[ChatUI] Ready for input');
  showEmptyState();
  inputEl.focus();
</script>
</body>
</html>
